<!DOCTYPE html>
<html lang="ru">
  <head>
    <script>
      (function(){var d=document,h=d.documentElement;h.classList.remove('theme-neon');h.classList.add('theme-standard');h.classList.remove('system-dark');h.classList.add('system-light');h.setAttribute('data-theme','standard');try{localStorage.setItem('updown-theme','standard')}catch(e){}var m=d.querySelector('meta[name="color-scheme"]');if(m)m.setAttribute('content','only light');try{var t=localStorage.getItem('updown-card-theme');if(!t&&localStorage.getItem('updown-card-palette-lock')==='1')t='dark';if(t&&t!=='standard')h.classList.add('updown-card-palette-lock');else h.classList.remove('updown-card-palette-lock')}catch(e2){}})();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="only light" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" href="/icon-512.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@600;700;800&family=Manrope:wght@500;600;700&family=Orbitron:wght@600;700;800&family=Outfit:wght@600;700&family=Plus+Jakarta+Sans:wght@500;600;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <title>Up&Down — Карточная игра на взятки</title>
  </head>
  <body>
    <div id="root">
      <div id="loading-fallback" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#0f172a;color:#94a3b8;font-size:16px;gap:12px">
        <span>Загрузка…</span>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function () {
        setTimeout(function () {
          var lb = document.getElementById('loading-fallback');
          if (!lb || lb.offsetParent === null) return;
          var root = document.getElementById('root');
          if (!root || root.children.length !== 1) return;
          lb.innerHTML =
            '<p style="margin:0 0 8px;color:#e2e8f0;text-align:center;max-width:320px;padding:0 16px">Долго грузится?</p>' +
            '<p style="margin:0 0 12px;font-size:13px;text-align:center;max-width:320px;padding:0 16px;line-height:1.45">На телефоне по Wi‑Fi dev-режим может идти минуту (огромный GameTable.tsx). Либо очистите данные сайта / не открывайте с иконки «на экран».</p>' +
            '<button type="button" onclick="location.reload()" style="padding:12px 24px;font-size:16px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#22d3ee;cursor:pointer">Обновить</button>';
        }, 20000);
      })();
    </script>
    <!-- Если после возврата с OAuth страница не загрузилась за 8 сек — показать подсказку -->
    <script>
      (function(){
        var h=window.location.hash;
        if(!h||!h.includes('access_token'))return;
        setTimeout(function(){
          var r=document.getElementById('root');
          var lb=document.getElementById('loading-fallback');
          if(r&&r.children.length===1&&lb&&lb.offsetParent!==null){
            lb.innerHTML='<p style="margin:0 0 12px;color:#e2e8f0">Страница не загрузилась</p><p style="margin:0 0 16px;font-size:14px">Нажмите кнопку ниже</p><button onclick="location.reload()" style="padding:12px 24px;font-size:16px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#22d3ee;cursor:pointer">Обновить</button>';
          }
        },8000);
      })();
    </script>
  </body>
</html>
